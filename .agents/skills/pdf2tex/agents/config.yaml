name: pdf2tex
description: Convert PDF documents into editable LaTeX source code
type: skill
skill_file: pdf2tex/SKILL.md
platforms:
  claude_code: {}
  openai:
    model: gpt-4.1
auto_activate:
  - triggers:
    - "convert.*pdf.*(tex|latex)"
    - "pdf.*(to|2).*(tex|latex)"
    - "extract.*latex.*(from|pdf)"
    - "reconstruct.*latex"
    - "pdf转tex"
    - "pdf转latex"
    - "/pdf2tex"
    file_patterns:
    - "*.pdf"
